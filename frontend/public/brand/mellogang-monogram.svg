<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="gold" x1="180" y1="160" x2="840" y2="880" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F3D7A0"/>
      <stop offset="35%" stop-color="#D7B06A"/>
      <stop offset="70%" stop-color="#C49A4E"/>
      <stop offset="100%" stop-color="#A67C35"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="260" y1="200" x2="760" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE7B8"/>
      <stop offset="50%" stop-color="#E0B86A"/>
      <stop offset="100%" stop-color="#B8893D"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent background intentionally empty -->

  <!-- Clean geometric M with integrated bottom chevron (monoline, thick, sharp) -->
  <g filter="url(#soft)" stroke="url(#gold)" stroke-width="96" stroke-linecap="butt" stroke-linejoin="miter" fill="none">
    <!-- Outer M: left leg, left peak, right peak, right leg -->
    <path d="M250 760
             V250
             L512 620
             L774 250
             V760"/>
  </g>

  <!-- Bottom chevron / arrow head under the M valley -->
  <path d="M320 690 L512 870 L704 690"
        stroke="url(#goldSoft)"
        stroke-width="88"
        stroke-linecap="butt"
        stroke-linejoin="miter"
        fill="none"
        filter="url(#soft)"/>
</svg>
